version: 1
complexity_profile: standard
project:
  name: spec-kit-demo
  feature_dir: features
  docs_dir: project-docs

spec:
  provider: spec-kit
  source_dir: specs
  required_outputs:
    - spec.md
    - plan.md
    - tasks.md

orchestrator:
  provider: codex-subagents
  default_mode: subagent
  long_task_default: true

skills:
  provider: superpowers
  role_method_map:
    spec_creator: brainstorming
    plan_creator: writing-plans
    implementer: subagent-driven-development
    reviewer: requesting-code-review
    tester: test-driven-development
    fixer: systematic-debugging

archive:
  provider: records
  records_dir: project-docs/records
  task_board: project-docs/03_TASK_BOARD.md
  subagent_dir: project-docs/subagent

runtime:
  state_dir: .agentflow/state
  active_context_file: active_context.json
  active_context_markdown_file: active_context.md
  enforce_dispatch_gate: true
  enforce_archive_gate: true
  hook_failure_policy: stop

implementation:
  target_sides:
    - backend
    - frontend
    - mobile

hooks:
  before_plan:
  before_tasks:
  before_dispatch:
  before_implement:
  before_test:
  before_review:
  before_fix:
  before_archive:
  after_spec:
  after_plan:
  after_tasks:
  after_dispatch:
  after_implement:
  after_test:
  after_review:
  after_fix:

gates:
  require_spec_review: true
  require_plan_review: true
  require_task_review: true
  require_dispatch_record_for_archive: true
  require_summary_records_for_done: true
  require_tests_before_done: true
  require_review_before_commit: true
