version: 1
profile: standard

project:
  feature_dir: features
  docs_dir: project-docs

spec:
  provider: spec-kit-compatible
  required_outputs:
    - spec.md
    - plan.md
    - tasks.md

orchestrator:
  provider: codex-subagents
  mode: subagent

skills:
  provider: vendored-superpowers
  vendored_superpowers: true

integrations:
  spec_kit:
    enabled: true
    mode: external-compatible
  oh_my_codex:
    enabled: false
    mode: optional-adapter

gates:
  require_spec_review: true
  require_plan_review: true
  require_task_review: true
  require_tests_before_done: true
  require_review_before_commit: true
