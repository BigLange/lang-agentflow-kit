version: 1
profile: standard
complexity_profile: standard

project:
  feature_dir: features
  docs_dir: project-docs

spec:
  provider: spec-kit-compatible
  required_outputs:
    - spec.md
    - plan.md
    - tasks.md

orchestrator:
  provider: codex-subagents
  mode: subagent

skills:
  provider: vendored-superpowers
  vendored_superpowers: true

integrations:
  spec_kit:
    enabled: true
    mode: external-compatible
  oh_my_codex:
    enabled: false
    mode: optional-adapter

runtime:
  state_dir: .agentflow/state
  active_context_file: active_context.json
  active_context_markdown_file: active_context.md
  enforce_dispatch_gate: true
  enforce_archive_gate: true
  hook_failure_policy: stop

workflow:
  default_type: standard

implementation:
  target_sides:
    - backend
    - frontend
    - mobile

review:
  spec:
    mode: self
  plan:
    mode: self
  tasks:
    mode: self
  implementation:
    mode: self

hooks:
  before_plan:
  before_tasks:
  before_dispatch:
  before_implement:
  before_test:
  before_review:
  before_fix:
  before_archive:
  after_spec:
  after_plan:
  after_tasks:
  after_dispatch:
  after_implement:
  after_test:
  after_review:
  after_fix:

gates:
  require_spec_review: true
  require_plan_review: true
  require_task_review: true
  require_dispatch_record_for_archive: true
  require_summary_records_for_done: true
  require_tests_before_done: true
  require_review_before_commit: true

external_module_policy:
  public_default_mode: reference-only
  public_vendor_allowed: false
  sensitive_domains:
    critical:
      - auth
      - user
      - permission
      - payment
      - crypto
      - file-upload
      - admin-account

external_modules: []
